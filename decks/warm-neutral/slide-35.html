<title>28 · Bot Create Step A</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .shot-wrap {
    margin-top: 20px;
    position: relative;

    background: var(--surface);
    border-radius: 10px;
    aspect-ratio: 16 / 9;
  }
  .shot-wrap img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
    object-position: top center;
  }
  .shot-label {
    position: absolute;
    top: 12px; left: 12px;
    padding: 5px 10px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px;
    border-radius: 4px;
    z-index: 2;
  }
  .shot-caption {
    margin-top: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.5;
  }
  .shot-caption strong { color: var(--accent); font-weight: 700; }
</style>
