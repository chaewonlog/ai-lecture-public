<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>03 · Hand-raise</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .q-list { margin-top: 26px; display: flex; flex-direction: column; gap: 12px; }
  .q-item {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 16px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    min-width: 32px;
  }
  .q-text {
    font-size: 19px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.015em;
  }
  .q-item.emphasize {
    background: var(--accent);
    border-color: var(--accent);
  }
  .q-item.emphasize .q-num { color: var(--bg); opacity: 0.85; }
  .q-item.emphasize .q-text { color: var(--bg); font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">WARM-UP</p>
  <h1 class="title m">손 한번<br><span class="accent">들어볼까요.</span></h1>
  <div class="q-list">
    <div class="q-item"><span class="q-num">Q1</span><span class="q-text">AI 써보신 분 있나요</span></div>
    <div class="q-item"><span class="q-num">Q2</span><span class="q-text">매일 쓰시는 분도 있나요</span></div>
    <div class="q-item emphasize"><span class="q-num">Q3</span><span class="q-text">결과에 만족하시나요</span></div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>03 / 43</span></div>
</div>
</body>
</html>
