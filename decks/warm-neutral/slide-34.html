<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>31 · Bot In Action</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .result-frame {
    margin-top: 20px;
    position: relative;
    border: 1px solid var(--border-strong);
    overflow: hidden;
    background: var(--bg);
    border-radius: 10px;
    aspect-ratio: 16 / 9;
  }
  .result-frame img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: top center;
  }
  .result-label {
    position: absolute;
    top: 12px; left: 12px;
    padding: 5px 10px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px;
    border-radius: 4px;
    z-index: 2;
  }
  .result-caption {
    margin-top: 12px;
    padding: 10px 16px;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.5;
  }
  .result-caption strong { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">BOT IN ACTION</p>
  <h1 class="title s">한 번 만들면 <span class="accent">클릭 한 번</span>으로.</h1>

  <div class="result-frame">
    <img src="./assets/gptbot-result.png" alt="만든 봇의 실제 결과물 화면">
    <span class="result-label">BOT OUTPUT</span>
  </div>

  <p class="result-caption">봇에 접속 → <strong>미리 심어둔 프롬프트</strong>가 자동 실행 → 매번 치지 않아도 같은 형식으로 결과물 출력</p>

  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>34 / 43</span></div>
</div>
</body>
</html>
