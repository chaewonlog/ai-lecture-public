<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>25 · Demo Newsletter Input</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .shot-wrap {
    margin-top: 20px;
    position: relative;
    border: 1px solid var(--border-strong);
    overflow: hidden;
    background: var(--surface);
    border-radius: 10px;
    aspect-ratio: 16 / 6;
  }
  .shot-wrap img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
    object-position: top center;
  }
  .shot-label {
    position: absolute;
    top: 12px; left: 12px;
    padding: 5px 10px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px;
    border-radius: 4px;
    z-index: 2;
  }
  .shot-caption {
    margin-top: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.5;
  }
  .shot-caption strong { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">LIVE DEMO · INPUT</p>
  <h1 class="title s">제 <span class="accent">뉴스레터 제목 + 조회수</span> 데이터.</h1>

  <div class="shot-wrap">
    <img src="./assets/newsletter-titles-2.png" alt="뉴스레터 제목 + 조회수 실제 데이터">
    <span class="shot-label">INPUT</span>
  </div>

  <p class="shot-caption">제목 + 조회수를 그대로 AI에 넣고 <strong>"잘 나온 제목 패턴 뽑아줘"</strong> 요청</p>

  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>26 / 43</span></div>
</div>
</body>
</html>
