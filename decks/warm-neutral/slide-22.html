<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>19 · Reverse Engineering 3 Steps</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .re-steps { display: flex; gap: 14px; margin-top: 26px; }
  .re-step {
    flex: 1;
    padding: 22px 18px;
    background: var(--surface);
    border-radius: 10px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .re-num {
    font-family: 'Pretendard', sans-serif;
    font-weight: 800;
    font-size: 44px;
    color: var(--border-strong);
    line-height: 0.95;
    letter-spacing: -0.035em;
  }
  .re-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .re-title {
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-top: 4px;
  }
  .re-desc { font-size: 13px; color: var(--muted); line-height: 1.5; margin-top: 4px; }
  .re-arrow {
    position: absolute;
    right: -16px;
    top: 50%;
    color: var(--accent);
    font-size: 20px;
    font-weight: 700;
    z-index: 2;
    background: var(--bg);
    padding: 0 4px;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">THE FRAMEWORK</p>
  <h1 class="title s">구조는 훔치고 내용만 바꾸면 됩니다.<br><span class="accent">역설계 3단계.</span></h1>
  <div class="re-steps">
    <div class="re-step">
      <p class="re-num">01</p>
      <p class="re-label">STEP · 진단</p>
      <p class="re-title">결과물 모으기</p>
      <p class="re-desc">잘 된 결과물을<br>먼저 모읍니다</p>
      <span class="re-arrow">→</span>
    </div>
    <div class="re-step">
      <p class="re-num">02</p>
      <p class="re-label">STEP · 역설계</p>
      <p class="re-title">패턴 뽑기</p>
      <p class="re-desc">AI에게 "공통 구조·<br>패턴 뽑아줘" 요청</p>
      <span class="re-arrow">→</span>
    </div>
    <div class="re-step">
      <p class="re-num">03</p>
      <p class="re-label">STEP · 이식</p>
      <p class="re-title">내 변수로 교체</p>
      <p class="re-desc">뽑아준 패턴을<br>내 변수로 바꾸면 끝</p>
    </div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>22 / 43</span></div>
</div>
</body>
</html>
