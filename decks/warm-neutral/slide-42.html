<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>33 · Newsletter CTA</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .cta-card {
    margin-top: 22px;
    padding: 26px 28px;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 12px;
    position: relative;
  }
  .cta-tag {
    position: absolute;
    top: -12px; left: 26px;
    background: var(--bg);
    padding: 0 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .cta-name {
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 34px;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .cta-name .dot { color: var(--accent); }
  .cta-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 16px;
    font-style: italic;
  }
  .cta-url {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--bg);
    letter-spacing: 0.3px;
    padding: 10px 18px;
    background: var(--accent);
    border-radius: 6px;
    display: inline-block;
  }
  .cta-note {
    margin-top: 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.3px;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">WANT MORE</p>
  <h1 class="title m">더 깊이<br><span class="accent">파고 싶으면.</span></h1>
  <div class="cta-card">
    <span class="cta-tag">NEWSLETTER</span>
    <p class="cta-name">인사이트로그<span class="dot">.</span></p>
    <p class="cta-desc">1인 5역 스타트업 PM의 AI 실험 로그.<br>읽고 나면, 뭔가 하나 해보고 싶어집니다.</p>
    <p class="cta-url">maily.so/insightlog</p>
    <p class="cta-note">* 주소 짧으니까 한 번 적어두세요. 오늘 다 못 다룬 세팅 · 자동화 · 봇 사례가 거기 있어요.</p>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>42 / 43</span></div>
</div>
</body>
</html>
