<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>24 · Stop Copy Paste</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .before-after {
    display: flex;
    gap: 18px;
    margin-top: 26px;
    align-items: stretch;
  }
  .ba-card {
    flex: 1;
    padding: 24px 24px;
    background: var(--surface);
    border-radius: 10px;
  }
  .ba-card.after {
    background: var(--accent);
  }
  .ba-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 14px;
    color: var(--muted);
  }
  .ba-card.after .ba-label { color: var(--bg); opacity: 0.9; }
  .ba-list { list-style: none; padding: 0; }
  .ba-list li {
    font-size: 16px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
  }
  .ba-list li:last-child { border-bottom: none; }
  .ba-card.after .ba-list li {
    color: var(--bg);
    font-weight: 600;
    border-bottom-color: rgba(250, 248, 245, 0.25);
  }
  .ba-list li strong { font-weight: 700; }
  .ba-vs {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 2px;
    padding: 0 2px;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">STOP THE LOOP</p>
  <h1 class="title m">매번 복붙은<br><span class="accent">그만하세요.</span></h1>
  <div class="before-after">
    <div class="ba-card">
      <p class="ba-label">매번 프롬프트 입력</p>
      <ul class="ba-list">
        <li>복붙 · 수정 · 반복</li>
        <li>실수 가능성</li>
        <li>결과 일관성 떨어짐</li>
      </ul>
    </div>
    <div class="ba-vs">→</div>
    <div class="ba-card after">
      <p class="ba-label">봇으로 박아두기</p>
      <ul class="ba-list">
        <li><strong>클릭 한 번</strong></li>
        <li>실수 없음</li>
        <li>일관된 결과</li>
      </ul>
    </div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>31 / 43</span></div>
</div>
</body>
</html>
