<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>22 · Prompt Sites Shortcut</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .site-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 220px;
    gap: 16px;
    margin-top: 18px;
  }
  .site-info {
    padding: 16px 16px;
    background: var(--surface);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow: hidden;
  }
  .site-tag {
    align-self: flex-start;
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px;
    color: var(--bg);
    background: var(--accent);
    padding: 4px 9px;
    border-radius: 4px;
  }
  .site-name {
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 24px;
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .site-url {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.3px;
    padding: 5px 9px;
    background: var(--bg);
    border-radius: 4px;
    align-self: flex-start;
  }
  .site-features {
    list-style: none;
    padding: 8px 0 0 0;
    margin-top: 2px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-top: 1px solid var(--border);
  }
  .site-features li {
    font-size: 12px;
    color: var(--text);
    line-height: 1.4;
    padding-left: 14px;
    position: relative;
  }
  .site-features li::before {
    content: '✓';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
    font-size: 10.5px;
  }

  .site-shot {
    position: relative;
    border: 1px solid var(--border-strong);
    overflow: hidden;
    background: var(--surface);
    border-radius: 10px;
  }
  .site-shot img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
    object-position: top center;
  }
  .site-shot::after {
    content: 'promptbase.com';
    position: absolute; bottom: 8px; right: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    color: var(--bg);
    padding: 4px 9px;
    background: var(--text);
    letter-spacing: 1px;
    border-radius: 3px;
  }

  .shortcut-note {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">SHORTCUT</p>
  <h1 class="title m">더 빠른 길도 있습니다.<br><span class="accent">프롬프트 사이트.</span></h1>

  <div class="site-layout">
    <div class="site-info">
      <span class="site-tag">GLOBAL</span>
      <p class="site-name">PromptBase</p>
      <p class="site-url">promptbase.com</p>
      <ul class="site-features">
        <li>글로벌 최대 프롬프트 마켓</li>
        <li>결과물 예시까지 확인 가능</li>
        <li>역설계 스킵 — 바로 쓰기</li>
      </ul>
    </div>
    <div class="site-shot">
      <img src="./assets/promptbase.png" alt="PromptBase marketplace">
    </div>
  </div>

  <p class="shortcut-note">* 잘 된 프롬프트 + 결과물이 이미 다 정리돼 있습니다.</p>

  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>24 / 43</span></div>
</div>
</body>
</html>
