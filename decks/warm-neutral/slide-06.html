<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>06 · Agenda</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .agenda-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 26px; }
  .agenda-item {
    display: flex;
    align-items: center;
    gap: 22px;
    padding: 18px 22px;
    background: var(--surface);
    border-radius: 8px;
  }
  .agenda-num {
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 34px;
    color: var(--accent);
    letter-spacing: -0.03em;
    min-width: 58px;
    line-height: 1;
  }
  .agenda-text {
    flex: 1;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.015em;
  }
  .agenda-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.8px;
    text-transform: uppercase;
    padding: 5px 10px;
    border: 1px solid var(--border-strong);
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">TODAY'S AGENDA</p>
  <h1 class="title m">오늘, 그 방법<br><span class="accent">3가지</span>를 드립니다.</h1>
  <div class="agenda-grid">
    <div class="agenda-item">
      <span class="agenda-num">01</span>
      <span class="agenda-text">나를 기억시키는 세팅</span>
      <span class="agenda-tag">커스텀 인스트럭션</span>
    </div>
    <div class="agenda-item">
      <span class="agenda-num">02</span>
      <span class="agenda-text">잘 된 결과물 역설계</span>
      <span class="agenda-tag">3단계 프레임</span>
    </div>
    <div class="agenda-item">
      <span class="agenda-num">03</span>
      <span class="agenda-text">나만의 봇 만들기</span>
      <span class="agenda-tag">GPTs / Projects / Gems</span>
    </div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>06 / 43</span></div>
</div>
</body>
</html>
