<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>18 · Don't Try</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .strike { position: relative; color: var(--muted); font-weight: 700; opacity: 0.7; }
  .strike::after {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 4px;
    background: var(--accent);
    transform: rotate(-2deg);
  }

  .stack { margin-top: 28px; display: flex; flex-direction: column; gap: 12px; }
  .stack-row {
    font-family: 'Pretendard', sans-serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--text);
    padding: 16px 22px;
    background: var(--surface);
    border-left: 4px solid var(--accent);
    border-radius: 0 8px 8px 0;
    letter-spacing: -0.02em;
    line-height: 1.3;
  }
  .stack-row strong { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">STOP</p>
  <h1 class="title m"><span class="strike">프롬프트 잘 짜려</span><br>하지 마세요.</h1>
  <div class="stack">
    <p class="stack-row">고민할수록 <strong>막힙니다</strong></p>
    <p class="stack-row">잘 된 결과물이 <strong>이미 넘쳐납니다</strong></p>
    <p class="stack-row"><strong>거기서 가져오면 됩니다</strong></p>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>21 / 43</span></div>
</div>
</body>
</html>
