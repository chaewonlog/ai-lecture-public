<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>30 · My Bots</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .bots-grid {
    margin-top: 18px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  .my-bots {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mybot-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 7px;
  }
  .mybot-icon {
    width: 26px; height: 26px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 5px;
  }
  .mybot-name {
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.015em;
    min-width: 82px;
  }
  .mybot-desc {
    flex: 1;
    font-size: 12px;
    color: var(--muted);
  }

  .bot-shot {
    position: relative;
    border: 1px solid var(--border-strong);
    overflow: hidden;
    background: var(--surface);
    border-radius: 10px;
    aspect-ratio: 16 / 9;
  }
  .bot-shot img {
    position: absolute;
    width: 450%;
    height: auto;
    max-width: none;
    display: block;
    left: 8%;
    top: -195%;
  }
  .bot-shot-label {
    position: absolute;
    top: 10px; left: 10px;
    padding: 4px 9px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-size: 9px; font-weight: 700;
    letter-spacing: 1.5px;
    border-radius: 3px;
    z-index: 2;
  }

  .tip-skill {
    margin-top: 12px;
    padding: 9px 14px;
    background: var(--surface);
    border-radius: 6px;
    font-size: 11.5px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.3px;
  }
  .tip-skill .k { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">IN PRODUCTION</p>
  <h1 class="title s">제가 실제로 쓰는<br><span class="accent">봇은 이런 것들</span>입니다.</h1>

  <div class="bots-grid">
    <div class="my-bots">
      <div class="mybot-row">
        <div class="mybot-icon">01</div>
        <p class="mybot-name">쿼리봇</p>
        <p class="mybot-desc">데이터 쿼리 짜주는 봇</p>
      </div>
      <div class="mybot-row">
        <div class="mybot-icon">02</div>
        <p class="mybot-name">경제지표봇</p>
        <p class="mybot-desc">매일 주요 지표 요약</p>
      </div>
      <div class="mybot-row">
        <div class="mybot-icon">03</div>
        <p class="mybot-name">이메일봇</p>
        <p class="mybot-desc">비즈니스 이메일 초안</p>
      </div>
    </div>

    <div class="bot-shot">
      <img src="./assets/gpt-bots.png" alt="ChatGPT 사이드바 — 실제 만들어 쓰는 봇 리스트">
      <span class="bot-shot-label">사이드바 · GPT 리스트</span>
    </div>
  </div>

  <p class="tip-skill"><span class="k">TIP</span> · 자주 쓰는 작업은 전부 봇으로 박아두세요. 요즘은 <span class="k">Skill</span>로도 만들 수 있어요.</p>

  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>33 / 43</span></div>
</div>
</body>
</html>
