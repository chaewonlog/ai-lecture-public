<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>08 · Test AI</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .steps { display: flex; gap: 12px; margin-top: 26px; }
  .step {
    flex: 1;
    padding: 16px 14px;
    background: var(--surface);
    border-radius: 8px;
    position: relative;
  }
  .step-num {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .step-text { font-size: 13px; color: var(--text); line-height: 1.5; font-weight: 500; }
  .step-arrow {
    position: absolute;
    right: -14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 16px;
    font-weight: 700;
    z-index: 2;
    background: var(--bg);
    padding: 0 4px;
  }
  .pull {
    margin-top: 22px;
    font-family: 'Pretendard', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--text);
    padding-left: 22px;
    border-left: 3px solid var(--accent);
    letter-spacing: -0.015em;
    line-height: 1.4;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">HOW TO CHOOSE</p>
  <h1 class="title m">고르는 가장 좋은 방법은<br><span class="accent">직접 테스트</span>입니다.</h1>
  <div class="steps">
    <div class="step"><p class="step-num">STEP 01</p><p class="step-text">평소 자주 하는 업무를<br>하나 떠올려보세요</p><span class="step-arrow">→</span></div>
    <div class="step"><p class="step-num">STEP 02</p><p class="step-text">거기서 자주 던지는<br>질문 하나 고르세요</p><span class="step-arrow">→</span></div>
    <div class="step"><p class="step-num">STEP 03</p><p class="step-text">세 AI에 똑같이<br>던져봅니다</p><span class="step-arrow">→</span></div>
    <div class="step"><p class="step-num">STEP 04</p><p class="step-text">결과 제일 마음에 드는<br>AI로 쓰세요</p></div>
  </div>
  <p class="pull">남들이 좋다는 거보다,<br>내 업무에 잘 맞는 게 정답입니다.</p>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>08 / 43</span></div>
</div>
</body>
</html>
