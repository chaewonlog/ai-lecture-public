<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>24 · Demo Newsletter Output</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .shot-wrap {
    margin-top: 20px;
    position: relative;
    border: 1px solid var(--border-strong);
    overflow: hidden;
    background: var(--bg);
    border-radius: 10px;
    aspect-ratio: 16 / 9;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shot-wrap img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
  }
  .shot-label {
    position: absolute;
    top: 12px; left: 12px;
    padding: 5px 10px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px;
    border-radius: 4px;
    z-index: 2;
  }
  .shot-caption {
    margin-top: 12px;
    padding: 10px 16px;
    background: var(--accent-soft);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    color: var(--text);
    font-weight: 600;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">LIVE DEMO · OUTPUT</p>
  <h1 class="title s">AI가 뽑은 <span class="accent">제목 패턴</span>.</h1>

  <div class="shot-wrap">
    <img src="./assets/title-after-top.png" alt="AI가 분석한 뉴스레터 제목 패턴 결과 (상위 3개 패턴)">
    <span class="shot-label">OUTPUT</span>
  </div>

  <p class="shot-caption">조회수 잘 나온 제목의 공통 구조·훅·키워드 분석 → 다음 제목 쓸 때 이 패턴 적용</p>

  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>27 / 43</span></div>
</div>
</body>
</html>
