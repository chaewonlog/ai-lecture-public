<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>40 · Takeaways</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .takeaway-row {
    display: flex;
    gap: 14px;
    margin-top: 26px;
  }
  .takeaway {
    flex: 1;
    padding: 22px 20px;
    background: var(--surface);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .takeaway-icon {
    font-family: 'Pretendard', sans-serif;
    font-weight: 800;
    font-size: 34px;
    color: var(--accent);
    letter-spacing: -0.035em;
    line-height: 0.95;
  }
  .takeaway-title {
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
    font-size: 19px;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }
  .takeaway-desc {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.6;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    margin-top: auto;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">TAKE IT HOME</p>
  <h1 class="title m">배포물<br><span class="accent">3종</span> 챙겨가세요.</h1>
  <div class="takeaway-row">
    <div class="takeaway">
      <p class="takeaway-icon">T1</p>
      <p class="takeaway-title">타입별<br>커스텀 인스트럭션</p>
      <p class="takeaway-desc">환각 차단형 · 글쓰기 특화형 · 업무 효율형<br>복붙 가능한 완성형 템플릿</p>
    </div>
    <div class="takeaway">
      <p class="takeaway-icon">T2</p>
      <p class="takeaway-title">역설계 3단계<br>프롬프트 템플릿</p>
      <p class="takeaway-desc">진단 → 역설계 → 이식<br>단계별로 바로 쓰는 프롬프트 모음</p>
    </div>
    <div class="takeaway">
      <p class="takeaway-icon">T3</p>
      <p class="takeaway-title">프롬프트 잘 짜는<br>메타 체크리스트</p>
      <p class="takeaway-desc">목적·데이터·함정·출력 형식<br>내 프롬프트 검증 14개 체크</p>
    </div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>40 / 43</span></div>
</div>
</body>
</html>
