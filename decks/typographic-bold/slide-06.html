<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>06 · Agenda</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .agenda-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 28px; }
  .agenda-item {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 18px 0;
    border-top: 2px solid var(--text);
  }
  .agenda-num {
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: 48px;
    color: var(--accent);
    letter-spacing: -0.04em;
    min-width: 90px;
    line-height: 1;
  }
  .agenda-text {
    flex: 1;
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .agenda-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 10px;
    border: 1.5px solid var(--text);
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">TODAY'S AGENDA</p>
  <h1 class="display m">오늘, 그 방법<br><span class="accent">3가지</span>를 드립니다.</h1>
  <div class="agenda-grid">
    <div class="agenda-item">
      <span class="agenda-num">01</span>
      <span class="agenda-text">나를 기억시키는 세팅</span>
      <span class="agenda-tag">커스텀 인스트럭션</span>
    </div>
    <div class="agenda-item">
      <span class="agenda-num">02</span>
      <span class="agenda-text">잘 된 결과물 역설계</span>
      <span class="agenda-tag">3단계 프레임</span>
    </div>
    <div class="agenda-item">
      <span class="agenda-num">03</span>
      <span class="agenda-text">나만의 봇 만들기</span>
      <span class="agenda-tag">GPTs / Projects / Gems</span>
    </div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>06 / 33</span></div>
</div>
</body>
</html>
