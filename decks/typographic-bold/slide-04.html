<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>04 · Hook</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .hook-compare {
    margin-top: 24px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 40px;
  }
  .tb-calendar {
    display: flex; gap: 4px;
    padding: 8px;
    border: 1.5px solid var(--text);
  }
  .tb-day {
    width: 26px; height: 44px;
    background: var(--bg);
    position: relative;
    display: flex; justify-content: center;
    padding-top: 4px;
  }
  .tb-day-n {
    font-family: 'Space Mono', monospace;
    font-size: 9px; font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }
  .tb-day::after {
    content: '';
    position: absolute;
    left: 4px; right: 4px; top: 18px; bottom: 5px;
    background: repeating-linear-gradient(180deg, var(--text) 0 2px, transparent 2px 5px);
    opacity: 0.35;
  }
  .tb-clock {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: var(--bg);
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .tb-clock::before {
    content: '';
    position: absolute; inset: 4px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0 16.67%, transparent 16.67% 100%);
    opacity: 0.25;
  }
  .tb-clock span {
    font-family: 'Pretendard', sans-serif; font-weight: 900;
    font-size: 18px;
    color: var(--accent);
    z-index: 1;
    letter-spacing: -1px;
  }
  .hook-stat {
    font-family: 'Pretendard', sans-serif; font-weight: 900;
    font-size: 48px;
    line-height: 0.9;
    letter-spacing: -0.03em;
    margin-top: 6px;
  }
  .hook-stat.red { color: var(--accent); }
  .hook-arrow {
    font-family: 'Pretendard', sans-serif; font-weight: 900;
    font-size: 56px;
    color: var(--accent);
    font-weight: 400;
  }
  .hook-side { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  .hook-meta {
    margin-top: 20px;
    display: flex; gap: 32px;
    align-items: baseline;
  }
  .hook-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--text);
    text-transform: uppercase;
  }
  .hook-label .accent-inline { color: var(--accent); }
  .hook-warmup {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--footnote);
    letter-spacing: 1.5px;
  }
  .hook-warmup .w-k { color: var(--text); font-weight: 700; }
  .hook-warmup .w-arrow { color: var(--accent); margin: 0 6px; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">HOOK</p>
  <h1 class="display l">같은 도구,<br><span class="accent">다른 결과.</span></h1>

  <div class="hook-compare">
    <div class="hook-side">
      <div class="tb-calendar">
        <div class="tb-day"><span class="tb-day-n">D1</span></div>
        <div class="tb-day"><span class="tb-day-n">D2</span></div>
        <div class="tb-day"><span class="tb-day-n">D3</span></div>
        <div class="tb-day"><span class="tb-day-n">D4</span></div>
        <div class="tb-day"><span class="tb-day-n">D5</span></div>
      </div>
      <p class="hook-stat">5일</p>
    </div>
    <div class="hook-arrow">→</div>
    <div class="hook-side">
      <div class="tb-clock"><span>1H</span></div>
      <p class="hook-stat red">1시간</p>
    </div>
  </div>

  <div class="hook-meta">
    <p class="hook-label">회계감사 자료 <span class="accent-inline">· 제가 직접 겪은 일</span></p>
    <p class="hook-warmup"><span class="w-k">블로그 초안</span> 3시간<span class="w-arrow">→</span>30분</p>
  </div>

  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>04 / 33</span></div>
</div>
</body>
</html>
