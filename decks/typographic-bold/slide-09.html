<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>09 · Free AI</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .offer-row { display: flex; gap: 20px; margin-top: 24px; }
  .offer {
    flex: 1;
    padding: 22px 20px;
    border: 1.5px solid var(--text);
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .offer-tag {
    display: inline-block;
    align-self: flex-start;
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px;
    color: var(--bg);
    background: var(--accent);
    padding: 4px 10px;
  }
  .offer-title {
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: -0.025em;
    line-height: 1.1;
  }
  .offer-title .big { color: var(--accent); }
  .offer-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 5px; }
  .offer-list li {
    font-size: 13px;
    color: var(--text);
    opacity: 0.8;
    line-height: 1.5;
    padding-left: 14px;
    position: relative;
  }
  .offer-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); font-weight: 900; }
  .caution {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: #C89B2C;
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border-soft);
    letter-spacing: 0.5px;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">FREE AI HACK</p>
  <h1 class="display m">유료는<br><span class="accent">무료로</span> 쓸 수 있습니다.</h1>
  <div class="offer-row">
    <div class="offer">
      <span class="offer-tag">학생 인증</span>
      <p class="offer-title">Google AI Pro<br><span class="big">1년 무료</span></p>
      <ul class="offer-list">
        <li>대학(원)생이면 인증만 하면 끝</li>
        <li>Gemini Advanced + NotebookLM Plus</li>
        <li>2TB 저장공간 포함</li>
      </ul>
    </div>
    <div class="offer">
      <span class="offer-tag">누구나 가능</span>
      <p class="offer-title">Coursera 수강<br><span class="big">3개월 무료</span></p>
      <ul class="offer-list">
        <li>Google AI 전문가 과정 수강 시</li>
        <li>AI 활용법도 배우고 이용권도 받고</li>
      </ul>
      <p class="caution">⚠ 7일 후 과금 — 불필요하면 구독 취소 필수</p>
    </div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>09 / 33</span></div>
</div>
</body>
</html>
