<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>11 · Demo A/B</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .q-bar {
    margin-top: 22px;
    padding: 14px 18px;
    background: var(--surface);
    border-left: 4px solid var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--text);
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .q-bar .q-label { color: var(--accent); font-weight: 700; margin-right: 10px; letter-spacing: 2px; }
  .ab { display: flex; gap: 20px; margin-top: 20px; }
  .ab-card {
    flex: 1;
    padding: 22px 20px;
    border: 1.5px solid var(--text);
  }
  .ab-card.good {
    background: var(--accent);
    border-color: var(--accent);
  }
  .ab-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 14px;
    color: #C89B2C;
  }
  .ab-card.good .ab-label { color: var(--bg); opacity: 0.85; }
  .ab-answer {
    font-family: 'Pretendard', sans-serif;
    font-weight: 800;
    font-size: 22px;
    line-height: 1.35;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .ab-card.good .ab-answer { color: var(--bg); }
</style>
</head>
<body>
<div class="slide top">
  <p class="eyebrow">LIVE DEMO</p>
  <h1 class="display m">먼저 보여드리겠습니다.<br><span class="accent">같은 질문, 다른 답변.</span></h1>
  <div class="q-bar"><span class="q-label">Q</span>2026년 한국 소상공인 종사자 수가 몇 명이야?</div>
  <div class="ab">
    <div class="ab-card">
      <p class="ab-label">A · 세팅 없음</p>
      <p class="ab-answer">그럴듯한 숫자를<br>자신 있게 말합니다</p>
    </div>
    <div class="ab-card good">
      <p class="ab-label">B · 세팅 있음</p>
      <p class="ab-answer">"확실하지 않습니다,<br>출처 확인 필요"</p>
    </div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>11 / 33</span></div>
</div>
</body>
</html>
