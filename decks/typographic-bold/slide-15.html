<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>15 · Where to Paste</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .paste-grid {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 22px;
  }

  .shot {
    position: relative;
    border: 1.5px solid var(--text);
    overflow: hidden;
    background: var(--surface);
    aspect-ratio: 3 / 2;
  }
  .shot img { width: 100%; height: 100%; display: block; object-fit: cover; }

  .cb { top: 38%; left: 10%; }
  .ca { top: 72%; left: 10%; }

  .p-guide { display: flex; flex-direction: column; gap: 10px; }
  .p-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px 0;
    border-top: 2px solid var(--text);
  }
  .p-badge {
    flex-shrink: 0;
    width: 38px; height: 38px;
    background: var(--accent);
    color: var(--bg);
    font-family: 'Pretendard', sans-serif; font-weight: 900;
    font-size: 22px;
    line-height: 38px;
    text-align: center;
    letter-spacing: -1px;
  }
  .p-body { flex: 1; }
  .p-title {
    font-family: 'Pretendard', sans-serif; font-weight: 900;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 3px;
  }
  .p-desc {
    font-size: 12.5px;
    color: var(--text);
    opacity: 0.75;
    line-height: 1.45;
  }
  .p-desc strong { color: var(--accent); opacity: 1; font-weight: 700; }

  .tags {
    margin-top: 4px;
    display: flex;
    gap: 8px;
  }
  .tag {
    padding: 5px 10px;
    border: 1.5px solid var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">COPY & PASTE · 5MIN</p>
  <h1 class="display m"><span class="accent">바로 복붙</span>하세요.</h1>

  <div class="paste-grid">
    <div class="shot">
      <img src="./assets/gpt-settings.png" alt="ChatGPT 개인 맞춤 설정">
      <span class="callout cb">B · 답변 방식</span>
      <span class="callout ca">A · 나에 대해</span>
    </div>

    <div class="p-guide">
      <div class="p-item">
        <span class="p-badge">B</span>
        <div class="p-body">
          <p class="p-title">맞춤형 지침</p>
          <p class="p-desc">어떻게 답해야 할지 · <strong>답변 템플릿</strong> 복붙</p>
        </div>
      </div>
      <div class="p-item">
        <span class="p-badge">A</span>
        <div class="p-body">
          <p class="p-title">당신에 대해</p>
          <p class="p-desc">나는 어떤 사람인지 · <strong>정체성</strong> 복붙</p>
        </div>
      </div>
      <div class="tags">
        <span class="tag">5분이면 끝</span>
        <span class="tag">오늘부터 적용</span>
      </div>
    </div>
  </div>

  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>15 / 33</span></div>
</div>
</body>
</html>
