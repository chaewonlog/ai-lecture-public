<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>33 · Q&A</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .qa-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    height: 100%;
  }
  .qa-title {
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: 220px;
    color: var(--text);
    letter-spacing: -0.05em;
    line-height: 1;
    margin-bottom: 20px;
  }
  .qa-title .accent-amp { color: var(--accent); }
  .qa-sub {
    font-size: 20px;
    color: var(--text);
    opacity: 0.75;
    line-height: 1.5;
    max-width: 560px;
    font-weight: 500;
  }
  .thanks {
    margin-top: 36px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    letter-spacing: 3.5px;
    font-weight: 700;
    padding: 8px 16px;
    border: 1.5px solid var(--text);
  }
</style>
</head>
<body>
<div class="slide">
  <div class="qa-wrap">
    <h1 class="qa-title">Q<span class="accent-amp">&amp;</span>A</h1>
    <p class="qa-sub">궁금한 거 편하게 물어봐주세요.</p>
    <p class="thanks">THANK YOU · CHAEWON</p>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>33 / 33</span></div>
</div>
</body>
</html>
