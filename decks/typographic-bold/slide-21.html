<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>21 · Prompt Sites Shortcut</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .site-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
    margin-top: 22px;
    align-items: stretch;
  }
  .site-info {
    padding: 20px 18px;
    border: 2px solid var(--text);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .site-tag {
    align-self: flex-start;
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px;
    color: var(--bg);
    background: var(--accent);
    padding: 4px 9px;
  }
  .site-name {
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: 32px;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .site-url {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.3px;
    padding: 6px 10px;
    background: var(--accent-soft);
    align-self: flex-start;
  }
  .site-features {
    list-style: none;
    padding: 0;
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-top: 12px;
    border-top: 1.5px solid var(--text);
  }
  .site-features li {
    font-size: 13px;
    color: var(--text);
    line-height: 1.45;
    font-weight: 700;
    padding-left: 14px;
    position: relative;
  }
  .site-features li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 900;
  }

  .site-shot {
    position: relative;
    border: 1.5px solid var(--text);
    overflow: hidden;
    background: var(--surface);
  }
  .site-shot img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
    object-position: top center;
  }
  .site-shot::after {
    content: 'promptbase.com';
    position: absolute; bottom: 10px; right: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 700;
    color: var(--bg);
    padding: 4px 9px;
    background: var(--text);
    letter-spacing: 1px;
  }

  .shortcut-note {
    margin-top: 12px;
    font-size: 13px;
    color: var(--text);
    opacity: 0.7;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">SHORTCUT</p>
  <h1 class="display m">더 빠른 길도 있습니다.<br><span class="accent">프롬프트 사이트.</span></h1>

  <div class="site-layout">
    <div class="site-info">
      <span class="site-tag">GLOBAL</span>
      <p class="site-name">PromptBase</p>
      <p class="site-url">promptbase.com</p>
      <ul class="site-features">
        <li>글로벌 최대 프롬프트 마켓</li>
        <li>결과물 예시까지 확인 가능</li>
        <li>역설계 스킵 — 바로 가져다 쓰기</li>
      </ul>
    </div>
    <div class="site-shot">
      <img src="./assets/promptbase.png" alt="PromptBase marketplace">
    </div>
  </div>

  <p class="shortcut-note">* 잘 된 프롬프트 + 결과물이 이미 다 정리돼 있습니다.</p>

  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>21 / 33</span></div>
</div>
</body>
</html>
