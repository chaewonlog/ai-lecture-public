<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>13 · Custom Instruction</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .concept-box {
    margin-top: 24px;
    padding: 24px 28px;
    border: 2.5px solid var(--text);
    position: relative;
  }
  .concept-q {
    position: absolute;
    top: -10px; left: 24px;
    background: var(--bg);
    padding: 0 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .concept-a {
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 1.3;
    letter-spacing: -0.025em;
  }
  .concept-a .hi { color: var(--accent); }

  .features { display: flex; gap: 14px; margin-top: 20px; }
  .feature {
    flex: 1;
    padding: 14px 16px;
    border-top: 2px solid var(--text);
  }
  .feature-icon {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: var(--accent);
    font-size: 12px;
    margin-bottom: 6px;
    letter-spacing: 1.5px;
  }
  .feature-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">THE SOLUTION</p>
  <h1 class="display m">세팅 하나면 됩니다.<br><span class="accent">커스텀 인스트럭션.</span></h1>
  <div class="concept-box">
    <p class="concept-q">커스텀 인스트럭션이란</p>
    <p class="concept-a">AI한테 <span class="hi">"나는 이런 사람이야,<br>이렇게 답해줘"</span>를 미리 저장해두는 기능입니다.</p>
  </div>
  <div class="features">
    <div class="feature"><p class="feature-icon">01</p><p class="feature-text">한 번 설정하면<br>모든 대화에 적용</p></div>
    <div class="feature"><p class="feature-icon">02</p><p class="feature-text">내 스타일에 맞는<br>답변을 받음</p></div>
    <div class="feature"><p class="feature-icon">03</p><p class="feature-text">설정창에서<br>3분이면 끝</p></div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>13 / 33</span></div>
</div>
</body>
</html>
