<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>30 · Takeaways</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .takeaway-row {
    display: flex;
    gap: 18px;
    margin-top: 28px;
  }
  .takeaway {
    flex: 1;
    padding: 26px 24px;
    border: 1.5px solid var(--text);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .takeaway-icon {
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: 48px;
    color: var(--accent);
    letter-spacing: -0.04em;
    line-height: 0.95;
  }
  .takeaway-title {
    font-family: 'Pretendard', sans-serif;
    font-weight: 900;
    font-size: 24px;
    letter-spacing: -0.025em;
    line-height: 1.2;
  }
  .takeaway-desc {
    font-size: 13px;
    color: var(--text);
    opacity: 0.75;
    line-height: 1.6;
    padding-top: 8px;
    border-top: 1px solid var(--border-soft);
    margin-top: auto;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">TAKE IT HOME</p>
  <h1 class="display m">배포물<br><span class="accent">2종</span> 챙겨가세요.</h1>
  <div class="takeaway-row">
    <div class="takeaway">
      <p class="takeaway-icon">T1</p>
      <p class="takeaway-title">타입별<br>커스텀 인스트럭션</p>
      <p class="takeaway-desc">환각 차단형 · 글쓰기 특화형 · 업무 효율형<br>복붙 가능한 완성형 템플릿 3종</p>
    </div>
    <div class="takeaway">
      <p class="takeaway-icon">T2</p>
      <p class="takeaway-title">역설계 3단계<br>프롬프트 템플릿</p>
      <p class="takeaway-desc">진단 → 역설계 → 이식<br>단계별로 바로 쓰는 프롬프트 모음</p>
    </div>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>30 / 33</span></div>
</div>
</body>
</html>
