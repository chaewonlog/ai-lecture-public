<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>20 · Where to Find</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .source-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 24px;
  }
  .source {
    padding: 14px 18px;
    border: 1.5px solid var(--text);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .source-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--bg);
    background: var(--accent);
    padding: 4px 8px;
    min-width: 76px;
    text-align: center;
  }
  .source-text {
    font-size: 15px;
    color: var(--text);
    font-weight: 700;
    line-height: 1.4;
  }

  .pull-bottom {
    margin-top: 18px;
    padding: 14px 20px;
    background: var(--accent-soft);
    border-left: 5px solid var(--accent);
    font-family: 'Pretendard', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.4;
  }
  .pull-bottom strong { color: var(--accent); font-weight: 900; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">STEP 1 · SOURCE</p>
  <h1 class="display m">잘 된 결과물은<br><span class="accent">어디서 찾을까요.</span></h1>
  <div class="source-grid">
    <div class="source"><span class="source-tag">블로그</span><span class="source-text">Medium · Brunch 인기 글</span></div>
    <div class="source"><span class="source-tag">카드뉴스</span><span class="source-text">인스타 비즈니스 계정</span></div>
    <div class="source"><span class="source-tag">PPT</span><span class="source-text">SlideShare · 노션 공개 템플릿</span></div>
    <div class="source"><span class="source-tag">뉴스레터</span><span class="source-text">평소 좋아서 읽는 뉴스레터</span></div>
  </div>
  <p class="pull-bottom">결국 <strong>"내가 좋다고 느낀 것"</strong>이 제일 좋은 재료입니다.</p>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>20 / 33</span></div>
</div>
</body>
</html>
