<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>18 · Don't Try</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .strike { position: relative; color: var(--text); opacity: 0.5; font-weight: 900; }
  .strike::after {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    height: 5px;
    background: var(--accent);
    transform: rotate(-2deg);
  }

  .stack { margin-top: 26px; display: flex; flex-direction: column; gap: 14px; }
  .stack-row {
    font-family: 'Pretendard', sans-serif;
    font-weight: 800;
    font-size: 26px;
    color: var(--text);
    padding: 18px 22px;
    border-left: 5px solid var(--accent);
    background: var(--surface);
    letter-spacing: -0.025em;
    line-height: 1.3;
  }
  .stack-row strong { color: var(--accent); font-weight: 900; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">STOP</p>
  <h1 class="display m"><span class="strike">프롬프트 잘 짜려</span><br>하지 마세요.</h1>
  <div class="stack">
    <p class="stack-row">고민할수록 <strong>막힙니다</strong></p>
    <p class="stack-row">잘 된 결과물이 <strong>이미 넘쳐납니다</strong></p>
    <p class="stack-row"><strong>거기서 가져오면 됩니다</strong></p>
  </div>
  <div class="footnote"><span class="rt">CHAEWON · INSIGHTLOG</span><span>18 / 33</span></div>
</div>
</body>
</html>
