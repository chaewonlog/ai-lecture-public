<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>06 · Agenda</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .agenda-grid { display: flex; flex-direction: column; gap: 16px; margin-top: 40px; }
  .agenda-item {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 20px 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .agenda-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -1px;
    min-width: 60px;
  }
  .agenda-text {
    flex: 1;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }
  .agenda-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">TODAY'S AGENDA</p>
  <h1 class="title md">오늘, 그 방법<br><span class="accent">3가지</span>를 드립니다.</h1>
  <div class="agenda-grid">
    <div class="agenda-item">
      <span class="agenda-num">01</span>
      <span class="agenda-text">나를 기억시키는 세팅</span>
      <span class="agenda-tag">커스텀 인스트럭션</span>
    </div>
    <div class="agenda-item">
      <span class="agenda-num">02</span>
      <span class="agenda-text">잘 된 결과물 역설계</span>
      <span class="agenda-tag">3단계 프레임</span>
    </div>
    <div class="agenda-item">
      <span class="agenda-num">03</span>
      <span class="agenda-text">나만의 봇 만들기</span>
      <span class="agenda-tag">GPTs / Projects / Gems</span>
    </div>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>06 / 33</span></div>
</div>
</body>
</html>
