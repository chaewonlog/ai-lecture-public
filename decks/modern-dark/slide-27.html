<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>27 · Demo Query Bot</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .demo-layout {
    margin-top: 18px;
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 18px;
    align-items: start;
  }
  .demo-flow { display: flex; flex-direction: column; gap: 5px; }
  .df-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 7px;
  }
  .df-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    min-width: 22px;
  }
  .df-text {
    flex: 1;
    font-size: 11.5px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.35;
  }
  .df-text .hi { color: var(--accent); font-weight: 700; }
  .df-row.highlight { background: rgba(77,127,255,0.08); border-color: var(--accent); }

  .shots { display: flex; flex-direction: column; gap: 10px; }
  .shot-wrap {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--card);
    aspect-ratio: 16 / 9;
  }
  .shot-wrap img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
    object-position: top center;
  }
  .shot-wrap .caption {
    position: absolute;
    top: 8px; left: 8px;
    padding: 3px 8px;
    background: var(--accent);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700;
    letter-spacing: 1.5px;
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  .closer {
    margin-top: 12px;
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.5;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">LIVE DEMO</p>
  <h1 class="title md"><span class="accent">쿼리봇</span> 만드는 과정.</h1>

  <div class="demo-layout">
    <div class="demo-flow">
      <div class="df-row"><span class="df-num">01</span><p class="df-text">대화로 쿼리를 여러 번 뽑아봅니다</p></div>
      <div class="df-row"><span class="df-num">02</span><p class="df-text">마음에 드는 결과가 나왔을 때 멈춥니다</p></div>
      <div class="df-row highlight"><span class="df-num">03</span><p class="df-text"><span class="hi">"이 과정을 봇으로 만들게. 지시문 써줘"</span></p></div>
      <div class="df-row"><span class="df-num">04</span><p class="df-text">AI가 지시문을 뽑아줍니다</p></div>
      <div class="df-row"><span class="df-num">05</span><p class="df-text">GPTs · Projects · Gems에 붙여넣기</p></div>
      <div class="df-row highlight"><span class="df-num">06</span><p class="df-text"><span class="hi">봇 완성</span></p></div>
    </div>

    <div class="shots">
      <div class="shot-wrap">
        <img src="./assets/bot-create-1.png" alt="GPT 만들기 - 이름·설명·지침 입력">
        <span class="caption">STEP · 지침 입력</span>
      </div>
      <div class="shot-wrap">
        <img src="./assets/bot-create-2.png" alt="GPT 만들기 - 지식·기능·모델 설정">
        <span class="caption">STEP · 기능 설정</span>
      </div>
    </div>
  </div>

  <p class="closer">처음부터 완벽한 프롬프트 안 짜도 됩니다. 대화로 먼저 쓸만한 결과를 만들고, 그 다음 "이걸 봇으로" 요청하세요.</p>

  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>27 / 33</span></div>
</div>
</body>
</html>
