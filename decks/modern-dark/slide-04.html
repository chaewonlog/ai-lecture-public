<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>04 · Hook</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .hook-body { margin-top: 28px; }

  /* Hero: 5일 캘린더 → 1시간 시계 */
  .hero {
    display: flex; align-items: center; justify-content: center;
    gap: 48px;
    padding: 22px 40px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .hero-side {
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    min-width: 180px;
  }

  /* Calendar — 5 day blocks with busy pattern */
  .calendar {
    display: flex; gap: 4px;
    padding: 8px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .cal-day {
    width: 26px; height: 42px;
    background: var(--bg);
    border-radius: 4px;
    position: relative;
    display: flex; justify-content: center;
    padding-top: 4px;
  }
  .cal-day-n {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700;
    color: var(--accent);
    opacity: 0.85;
    letter-spacing: 0.5px;
  }
  .cal-day::after {
    content: '';
    position: absolute;
    left: 4px; right: 4px;
    top: 18px; bottom: 5px;
    background: repeating-linear-gradient(180deg, var(--dim) 0 2px, transparent 2px 5px);
    opacity: 0.55;
  }

  /* Clock — 1h arc */
  .clock {
    width: 58px; height: 58px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    background: var(--surface);
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .clock::before {
    content: '';
    position: absolute; inset: 3px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0 16.67%, transparent 16.67% 100%);
    opacity: 0.35;
  }
  .clock-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 700;
    color: var(--accent);
    z-index: 1;
  }

  .hero-stat { font-size: 26px; font-weight: 700; letter-spacing: -0.8px; }
  .hero-side.after .hero-stat { color: var(--accent); }

  .hero-arrow {
    font-size: 36px; color: var(--accent); font-weight: 300;
    margin-top: -16px;
  }

  .hero-caption {
    text-align: center;
    font-size: 14px; color: var(--muted);
    margin-top: 12px;
    letter-spacing: -0.2px;
  }
  .hero-caption strong { color: var(--text); font-weight: 700; }
  .hero-caption .note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--dim);
    margin-left: 8px; letter-spacing: 1px;
  }

  .warmup {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--dim);
    margin-top: 8px;
    letter-spacing: 1.2px;
  }
  .warmup .k { color: var(--muted); font-weight: 700; }
  .warmup .arrow { color: var(--accent); margin: 0 8px; }
</style>
</head>
<body>
<div class="slide">
  <div class="glow top-right"></div>
  <p class="eyebrow">HOOK</p>
  <h1 class="title md">같은 도구,<br><span class="accent">다른 결과.</span></h1>

  <div class="hook-body">
    <div class="hero">
      <div class="hero-side">
        <div class="calendar">
          <div class="cal-day"><span class="cal-day-n">D1</span></div>
          <div class="cal-day"><span class="cal-day-n">D2</span></div>
          <div class="cal-day"><span class="cal-day-n">D3</span></div>
          <div class="cal-day"><span class="cal-day-n">D4</span></div>
          <div class="cal-day"><span class="cal-day-n">D5</span></div>
        </div>
        <p class="hero-stat">5일</p>
      </div>

      <div class="hero-arrow">→</div>

      <div class="hero-side after">
        <div class="clock"><span class="clock-text">1H</span></div>
        <p class="hero-stat">1시간</p>
      </div>
    </div>

    <p class="hero-caption"><strong>회계감사 자료</strong><span class="note">* 제가 직접 겪은 일</span></p>
    <p class="warmup">
      <span class="k">블로그 초안</span><span>3시간</span><span class="arrow">→</span><span>30분</span>
    </p>
  </div>

  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>04 / 33</span></div>
</div>
</body>
</html>
