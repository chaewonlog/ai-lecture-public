<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>11 · Demo A/B</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .question-bar { margin-top: 24px; padding: 14px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; font-size: 15px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; }
  .question-bar .q-label { color: var(--accent); font-weight: 700; margin-right: 10px; }
  .ab { display: flex; gap: 20px; margin-top: 24px; }
  .ab-card { flex: 1; padding: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
  .ab-card.good { border-color: var(--accent); background: rgba(77,127,255,0.06); }
  .ab-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; margin-bottom: 14px; }
  .ab-card .ab-label { color: #E08E3A; }
  .ab-card.good .ab-label { color: var(--accent); }
  .ab-answer { font-size: 19px; font-weight: 600; line-height: 1.5; letter-spacing: -0.3px; }
  .ab-card.good .ab-answer { color: var(--accent); }
</style>
</head>
<body>
<div class="slide top">
  <p class="eyebrow">LIVE DEMO</p>
  <h1 class="title md">먼저 보여드리겠습니다.<br><span class="accent">같은 질문, 다른 답변.</span></h1>
  <div class="question-bar"><span class="q-label">Q</span>2026년 한국 소상공인 종사자 수가 몇 명이야?</div>
  <div class="ab">
    <div class="ab-card">
      <p class="ab-label">A 버전 · 세팅 없음</p>
      <p class="ab-answer">그럴듯한 숫자를<br>자신 있게 말합니다</p>
    </div>
    <div class="ab-card good">
      <p class="ab-label">B 버전 · 세팅 있음</p>
      <p class="ab-answer">"확실하지 않습니다,<br>출처 확인 필요"</p>
    </div>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>11 / 33</span></div>
</div>
</body>
</html>
