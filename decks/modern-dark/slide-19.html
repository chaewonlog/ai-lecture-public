<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>19 · Reverse Engineering 3 Steps</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .re-steps { display: flex; gap: 16px; margin-top: 36px; }
  .re-step { flex: 1; padding: 24px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; position: relative; }
  .re-num { font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 700; color: var(--surface); line-height: 1.3; letter-spacing: -1.5px; }
  .re-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--accent); margin-top: 8px; margin-bottom: 10px; }
  .re-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.5px; }
  .re-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .re-arrow { position: absolute; right: -18px; top: 58%; color: var(--accent); font-size: 22px; z-index: 2; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">THE FRAMEWORK</p>
  <h1 class="title md">구조는 훔치고 내용만 바꾸면 됩니다.<br><span class="accent">역설계 3단계.</span></h1>
  <div class="re-steps">
    <div class="re-step">
      <p class="re-num">01</p>
      <p class="re-label">STEP · 진단</p>
      <p class="re-title">결과물 모으기</p>
      <p class="re-desc">잘 된 결과물을<br>먼저 모읍니다</p>
      <span class="re-arrow">→</span>
    </div>
    <div class="re-step">
      <p class="re-num">02</p>
      <p class="re-label">STEP · 역설계</p>
      <p class="re-title">패턴 뽑기</p>
      <p class="re-desc">AI에게 "공통 구조·<br>패턴 뽑아줘" 요청</p>
      <span class="re-arrow">→</span>
    </div>
    <div class="re-step">
      <p class="re-num">03</p>
      <p class="re-label">STEP · 이식</p>
      <p class="re-title">내 변수로 교체</p>
      <p class="re-desc">뽑아준 패턴을<br>내 변수로 바꾸면 끝</p>
    </div>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>19 / 33</span></div>
</div>
</body>
</html>
