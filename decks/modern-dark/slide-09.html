<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>09 · Free AI</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .offer-row { display: flex; gap: 24px; margin-top: 36px; }
  .offer { flex: 1; padding: 28px 24px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; position: relative; }
  .offer-tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--accent); background: rgba(77,127,255,0.12); padding: 4px 10px; border-radius: 4px; margin-bottom: 14px; }
  .offer-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 14px; }
  .offer-title .big { color: var(--accent); }
  .offer-list { list-style: none; padding: 0; }
  .offer-list li { font-size: 14px; color: var(--muted); line-height: 1.7; padding-left: 14px; position: relative; }
  .offer-list li::before { content: '·'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
  .caution { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #E08E3A; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); letter-spacing: 0.5px; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">FREE AI HACK</p>
  <h1 class="title md">유료는<br><span class="accent">무료로</span> 쓸 수 있습니다.</h1>
  <div class="offer-row">
    <div class="offer">
      <span class="offer-tag">학생 인증</span>
      <p class="offer-title">Google AI Pro <span class="big">1년 무료</span></p>
      <ul class="offer-list">
        <li>대학(원)생이면 인증만 하면 끝</li>
        <li>Gemini Advanced + NotebookLM Plus</li>
        <li>2TB 저장공간 포함</li>
      </ul>
    </div>
    <div class="offer">
      <span class="offer-tag">누구나 가능</span>
      <p class="offer-title">Coursera 수강 <span class="big">3개월 무료</span></p>
      <ul class="offer-list">
        <li>Google AI 전문가 과정 수강 시</li>
        <li>AI 활용법도 배우고 이용권도 받고</li>
      </ul>
      <p class="caution">⚠ 7일 후 과금 — 불필요하면 구독 취소 필수</p>
    </div>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>09 / 33</span></div>
</div>
</body>
</html>
