<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>15 · Where to Paste</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .paste-grid {
    margin-top: 22px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 22px;
  }

  /* Screenshot with callouts */
  .shot {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--card);
    aspect-ratio: 3 / 2;
  }
  .shot img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
    object-position: center;
  }
  .shot::after {
    content: '';
    position: absolute; inset: 0;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.35);
    pointer-events: none;
  }

  .callout {
    position: absolute;
    padding: 5px 9px;
    border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    background: var(--accent);
    color: #fff;
    z-index: 2;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .callout::after {
    content: '';
    position: absolute;
    right: -6px; top: 50%;
    margin-top: -5px;
    width: 0; height: 0;
    border-left: 6px solid var(--accent);
    border-top: 5px solid transparent;
    border-bottom: 5px solid transparent;
  }
  .callout.b { top: 38%; left: 10%; }
  .callout.a { top: 72%; left: 10%; }

  /* Right guide panel */
  .guide {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .g-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .g-item:last-of-type { border-bottom: none; }
  .g-badge {
    flex-shrink: 0;
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 6px;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .g-body { flex: 1; }
  .g-title {
    font-size: 14px; font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
    letter-spacing: -0.3px;
  }
  .g-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  .actions {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    padding: 5px 10px;
    background: rgba(77,127,255,0.1);
    border: 1px solid rgba(77,127,255,0.3);
    border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">COPY & PASTE · 5MIN</p>
  <h1 class="title lg"><span class="accent">바로 복붙</span>하세요.</h1>

  <div class="paste-grid">
    <div class="shot">
      <img src="./assets/gpt-settings.png" alt="ChatGPT 개인 맞춤 설정">
      <span class="callout b">B · 답변 방식</span>
      <span class="callout a">A · 나에 대해</span>
    </div>

    <div class="guide">
      <div class="g-item">
        <span class="g-badge">B</span>
        <div class="g-body">
          <p class="g-title">맞춤형 지침</p>
          <p class="g-desc">어떻게 답해야 할지 · <strong style="color:var(--accent)">답변 템플릿</strong> 복붙</p>
        </div>
      </div>
      <div class="g-item">
        <span class="g-badge">A</span>
        <div class="g-body">
          <p class="g-title">당신에 대해 알려주세요</p>
          <p class="g-desc">나는 어떤 사람인지 · <strong style="color:var(--accent)">정체성</strong> 복붙</p>
        </div>
      </div>
      <div class="actions">
        <span class="tag">5분이면 끝</span>
        <span class="tag">오늘부터 적용</span>
      </div>
    </div>
  </div>

  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>15 / 33</span></div>
</div>
</body>
</html>
