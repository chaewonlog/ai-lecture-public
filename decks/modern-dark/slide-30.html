<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>30 · Takeaways</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .takeaway-row { display: flex; gap: 20px; margin-top: 40px; }
  .takeaway { flex: 1; padding: 30px 28px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; }
  .takeaway-icon { font-family: 'JetBrains Mono', monospace; font-size: 40px; font-weight: 700; color: var(--accent); letter-spacing: -1.5px; margin-bottom: 16px; line-height: 1.35; }
  .takeaway-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.5px; }
  .takeaway-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">TAKE IT HOME</p>
  <h1 class="title md">배포물<br><span class="accent">2종</span> 챙겨가세요.</h1>
  <div class="takeaway-row">
    <div class="takeaway">
      <p class="takeaway-icon">T1</p>
      <p class="takeaway-title">타입별<br>커스텀 인스트럭션</p>
      <p class="takeaway-desc">환각 차단형 · 글쓰기 특화형 · 업무 효율형<br>복붙 가능한 완성형 템플릿 3종</p>
    </div>
    <div class="takeaway">
      <p class="takeaway-icon">T2</p>
      <p class="takeaway-title">역설계 3단계<br>프롬프트 템플릿</p>
      <p class="takeaway-desc">진단 → 역설계 → 이식<br>단계별로 바로 쓰는 프롬프트 모음</p>
    </div>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>30 / 33</span></div>
</div>
</body>
</html>
