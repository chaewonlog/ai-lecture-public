<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>22 · Demo Newsletter Pattern</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .demo-grid {
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    gap: 0;
    margin-top: 20px;
    align-items: stretch;
  }
  .demo-col { display: flex; flex-direction: column; gap: 8px; }
  .demo-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .demo-shot {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--card);
    aspect-ratio: 16 / 10;
  }
  .demo-shot img {
    width: 100%; height: 100%;
    display: block;
    object-fit: cover;
    object-position: top center;
  }
  .demo-shot.output img { object-position: center; }
  .demo-arrow {
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; color: var(--accent); font-weight: 300;
  }
  .demo-caption {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  .insight {
    margin-top: 16px;
    padding: 14px 18px;
    background: rgba(77,127,255,0.08);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
  }
  .insight-title {
    font-size: 14px; font-weight: 700;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .insight-text {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">LIVE DEMO</p>
  <h1 class="title md">제 뉴스레터 제목<br><span class="accent">패턴 뽑기.</span></h1>

  <div class="demo-grid">
    <div class="demo-col">
      <p class="demo-label">Input · 내 데이터</p>
      <div class="demo-shot">
        <img src="./assets/newsletter-data.png" alt="뉴스레터 제목 + 조회수 데이터">
      </div>
      <p class="demo-caption">제목 + 조회수 실제 데이터</p>
    </div>
    <div class="demo-arrow">→</div>
    <div class="demo-col">
      <p class="demo-label">Output · AI 분석</p>
      <div class="demo-shot output">
        <img src="./assets/title-after.png" alt="AI가 뽑은 제목 패턴">
      </div>
      <p class="demo-caption">조회수 잘 나온 제목의 공통 패턴</p>
    </div>
  </div>

  <div class="insight">
    <p class="insight-title">남의 결과물이 아니라, 제 실제 데이터입니다.</p>
    <p class="insight-text">블로그 제목 · 유튜브 썸네일 · 카드뉴스 훅 — 여러분 데이터로 똑같이 할 수 있어요.</p>
  </div>

  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>22 / 33</span></div>
</div>
</body>
</html>
