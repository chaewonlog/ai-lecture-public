<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>03 · Hand-raise</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .q-list { margin-top: 40px; display: flex; flex-direction: column; gap: 20px; }
  .q-item {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 18px 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: all 0.3s;
  }
  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .q-text {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }
  .q-item.emphasize { border-color: var(--accent); background: rgba(77, 127, 255, 0.08); }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">WARM-UP</p>
  <h1 class="title md">손 한번<br><span class="accent">들어볼까요.</span></h1>
  <div class="q-list">
    <div class="q-item"><span class="q-num">Q1</span><span class="q-text">AI 써보신 분 있나요</span></div>
    <div class="q-item"><span class="q-num">Q2</span><span class="q-text">매일 쓰시는 분도 있나요</span></div>
    <div class="q-item emphasize"><span class="q-num">Q3</span><span class="q-text">결과에 만족하시나요</span></div>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>03 / 33</span></div>
</div>
</body>
</html>
