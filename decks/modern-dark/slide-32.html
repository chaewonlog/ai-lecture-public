<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>32 · Newsletter CTA</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .cta-card { margin-top: 36px; padding: 44px 40px; background: var(--card); border: 1px solid var(--accent); border-radius: 16px; position: relative; }
  .cta-tag { position: absolute; top: -12px; left: 36px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--accent); background: var(--bg); padding: 0 12px; }
  .cta-name { font-size: 52px; font-weight: 700; letter-spacing: -2px; line-height: 1.2; margin-bottom: 14px; }
  .cta-name .dot { color: var(--accent); }
  .cta-desc { font-size: 16px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; font-style: italic; }
  .cta-url { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; padding: 14px 20px; background: rgba(77,127,255,0.08); border-radius: 8px; display: inline-block; }
  .cta-note { margin-top: 16px; font-size: 13px; color: var(--dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">WANT MORE</p>
  <h1 class="title md">더 깊이<br><span class="accent">파고 싶으면.</span></h1>
  <div class="cta-card">
    <span class="cta-tag">NEWSLETTER</span>
    <p class="cta-name">인사이트로그<span class="dot">.</span></p>
    <p class="cta-desc">1인 5역 스타트업 PM의 AI 실험 로그.<br>읽고 나면, 뭔가 하나 해보고 싶어집니다.</p>
    <p class="cta-url">maily.so/insightlog</p>
    <p class="cta-note">* 주소 짧으니까 한 번 적어두세요. 오늘 다 못 다룬 세팅 · 자동화 · 봇 사례가 거기 있어요.</p>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>32 / 33</span></div>
</div>
</body>
</html>
