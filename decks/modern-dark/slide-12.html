<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>12 · Remember You</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .vs { display: flex; gap: 24px; margin-top: 36px; align-items: stretch; }
  .vs-card { flex: 1; padding: 28px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
  .vs-card.b { border-color: var(--accent); }
  .vs-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 2px; margin-bottom: 12px; color: var(--dim); }
  .vs-card.b .vs-label { color: var(--accent); }
  .vs-desc { font-size: 17px; line-height: 1.5; color: var(--text); font-weight: 500; }
  .vs-center { display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--accent); font-weight: 700; letter-spacing: 2px; padding: 0 4px; }
  .kicker-bottom { margin-top: 28px; font-size: 15px; color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">THE REAL DIFFERENCE</p>
  <h1 class="title md">차이는<br><span class="accent">"나를 기억시켰냐"</span>입니다.</h1>
  <div class="vs">
    <div class="vs-card">
      <p class="vs-label">A</p>
      <p class="vs-desc">매번 처음 보는<br>사람에게 답하는 AI</p>
    </div>
    <div class="vs-center">VS</div>
    <div class="vs-card b">
      <p class="vs-label">B</p>
      <p class="vs-desc">내가 뭘 원하는지<br>이미 아는 AI</p>
    </div>
  </div>
  <p class="kicker-bottom">보통은 대화마다 처음부터 다시 시작합니다. "나는 이런 사람이야"를 매번 칩니다.<br>고수는 그걸 미리 저장해둡니다.</p>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>12 / 33</span></div>
</div>
</body>
</html>
