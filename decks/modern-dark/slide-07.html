<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>07 · Choose AI</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .ai-row { display: flex; gap: 16px; margin-top: 36px; }
  .ai-card { flex: 1; padding: 24px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
  .ai-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); margin-bottom: 16px; }
  .ai-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.5px; }
  .ai-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .tip { margin-top: 32px; padding: 16px 20px; background: rgba(77, 127, 255, 0.08); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; }
  .tip-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 6px; }
  .tip-text { font-size: 15px; color: var(--muted); }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">PRELUDE</p>
  <h1 class="title md">그 전에,<br><span class="accent">AI 하나</span>는 고르셔야 합니다.</h1>
  <div class="ai-row">
    <div class="ai-card">
      <div class="ai-dot"></div>
      <p class="ai-name">ChatGPT</p>
      <p class="ai-desc">범용, 가장 대중적</p>
    </div>
    <div class="ai-card">
      <div class="ai-dot"></div>
      <p class="ai-name">Claude</p>
      <p class="ai-desc">글쓰기 · 분석에 강함</p>
    </div>
    <div class="ai-card">
      <div class="ai-dot"></div>
      <p class="ai-name">Gemini</p>
      <p class="ai-desc">구글 연동, NotebookLM</p>
    </div>
  </div>
  <div class="tip">
    <p class="tip-label">TIP</p>
    <p class="tip-text">오늘 배울 3가지 다 "어떤 AI"에서 쓰는지 먼저 정해야 합니다</p>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>07 / 33</span></div>
</div>
</body>
</html>
