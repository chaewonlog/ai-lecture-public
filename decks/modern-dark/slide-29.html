<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>29 · Homework</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .hw-box { margin-top: 36px; padding: 40px; background: var(--card); border: 1px solid var(--accent); border-radius: 16px; position: relative; }
  .hw-tag { position: absolute; top: -12px; left: 36px; font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--accent); background: var(--bg); padding: 0 12px; }
  .hw-title { font-size: 28px; font-weight: 700; line-height: 1.4; letter-spacing: -0.5px; }
  .hw-title .hi { color: var(--accent); }
  .hw-steps { margin-top: 24px; display: flex; gap: 14px; }
  .hw-step { flex: 1; padding: 14px 16px; background: var(--surface); border-radius: 8px; }
  .hw-step-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--accent); margin-bottom: 6px; }
  .hw-step-text { font-size: 13px; color: var(--text); line-height: 1.4; font-weight: 500; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">HOMEWORK</p>
  <h1 class="title md">집에 가서<br><span class="accent">딱 하나만</span> 해보세요.</h1>
  <div class="hw-box">
    <span class="hw-tag">TODAY'S TASK</span>
    <p class="hw-title">자주 쓰는 프롬프트 <span class="hi">하나</span>만<br>골라서, 봇으로 만들어보세요.</p>
    <div class="hw-steps">
      <div class="hw-step"><p class="hw-step-num">STEP 1</p><p class="hw-step-text">자주 치는<br>프롬프트 하나 고르기</p></div>
      <div class="hw-step"><p class="hw-step-num">STEP 2</p><p class="hw-step-text">GPTs / Projects /<br>Gems에 심기</p></div>
      <div class="hw-step"><p class="hw-step-num">STEP 3</p><p class="hw-step-text">내일부터<br>클릭 한 번으로 쓰기</p></div>
    </div>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>29 / 33</span></div>
</div>
</body>
</html>
