<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>13 · Custom Instruction</title>
<link rel="stylesheet" href="./styles.css">
<style>
  .concept-box { margin-top: 32px; padding: 32px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
  .concept-q { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--dim); letter-spacing: 1px; margin-bottom: 14px; }
  .concept-a { font-size: 22px; font-weight: 600; line-height: 1.5; color: var(--text); }
  .concept-a .hi { color: var(--accent); }
  .features { display: flex; gap: 16px; margin-top: 24px; }
  .feature { flex: 1; padding: 16px 20px; background: var(--surface); border-radius: 8px; }
  .feature-icon { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent); font-size: 14px; margin-bottom: 6px; letter-spacing: 1px; }
  .feature-text { font-size: 14px; color: var(--muted); line-height: 1.5; }
</style>
</head>
<body>
<div class="slide">
  <p class="eyebrow">THE SOLUTION</p>
  <h1 class="title md">세팅 하나면 됩니다.<br><span class="accent">커스텀 인스트럭션.</span></h1>
  <div class="concept-box">
    <p class="concept-q">// 커스텀 인스트럭션이란</p>
    <p class="concept-a">AI한테 <span class="hi">"나는 이런 사람이야,<br>이렇게 답해줘"</span>를 미리 저장해두는 기능입니다.</p>
  </div>
  <div class="features">
    <div class="feature"><p class="feature-icon">01</p><p class="feature-text">한 번 설정하면 모든 대화에 적용</p></div>
    <div class="feature"><p class="feature-icon">02</p><p class="feature-text">내 스타일에 맞는 답변을 받음</p></div>
    <div class="feature"><p class="feature-icon">03</p><p class="feature-text">설정창에서 3분이면 끝</p></div>
  </div>
  <div class="meta"><span>CHAEWON · INSIGHTLOG</span><span>13 / 33</span></div>
</div>
</body>
</html>
